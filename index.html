<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Our App</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.PNG">
    <link rel="icon" href="data:,">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-container">
        <h2 id="form-title">Welcome Back</h2>
        <input type="text" id="first-name" placeholder="First Name" style="display: none;">
        <input type="text" id="last-name" placeholder="Last Name" style="display: none;">
        
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        
        <button id="auth-btn">Log In</button>
        <p id="toggle-auth">Need an account? <span>Sign Up</span></p>
    </div>

    <div id="app-content">
        <h2 id="welcome-msg"></h2>
        
        <div class="social-box">
            <input type="text" id="user-search" placeholder="Find friends...">
            <div id="search-results"></div>
        </div>

        <div class="social-box">
            <h3 style="color: #ff4d6d; margin: 0 0 10px 0; font-size: 18px;">My Friends</h3>
            <div id="friends-list" style="width: 100%;">
                <p style="color: #a3a3a3; font-size: 14px; text-align: center;">No friends added yet!</p>
            </div>
        </div>

        <button id="love-button">❤️</button>
        <div id="message">I love you!</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
